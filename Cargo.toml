[package]
name = "media-rs"
version = "26.6.0"
edition = "2024"
links = "ffmpeg"
build = "build.rs"
description = "Encode, decode and process audio/video with FFmpeg, via statically-linked libraries."
license = "GPL-3.0"
repository = "https://github.com/vegidio/media-rs"
homepage = "https://github.com/vegidio/media-rs"
readme = "README.md"
authors = ["Vinicius Egidio <me@vinicius.io>"]
keywords = ["ffmpeg", "video", "audio", "codec", "media"]
categories = ["multimedia", "external-ffi-bindings"]
exclude = [".cargo/", ".github/", ".idea/", ".editorconfig", "rustfmt.toml", "wrapper.h", "assets/", "docs/", "examples/", "scripts/", "xtask/"]

[lib]
name = "media"

[dependencies]
thiserror = "2"
# Image encoding for frame extraction. `rust-sak` (feature `image`) provides a simplified,
# multi-format encoder over the `image` crate; `image` itself is used only to build the
# in-memory `DynamicImage` from raw RGB bytes before handing it off to be encoded.
rust-sak = { git = "https://github.com/vegidio/rust-sak", tag = "26.7.0", features = ["image"] }
image = { version = "0.25", default-features = false }

# `build.rs` only downloads the prebuilt archive and emits link directives; the FFI
# bindings are pre-generated by `xtask` and committed (see src/sys/bindings.rs), so no
# bindgen/libclang is needed to consume this crate.
[build-dependencies]
ureq = "3"
zip = { version = "8", default-features = false, features = ["deflate"] }

[workspace]
members = ["xtask"]